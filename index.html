<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typing Test Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #646669;
            --caret-color: #e2b714;
            --sub-color: #2c2e31;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
            --error-extra-color: #7e2a33;
            --success-color: #43b581;
            --gold-color: #ffd700;
            --silver-color: #c0c0c0;
            --bronze-color: #cd7f32;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'JetBrains Mono', monospace;
            color: var(--main-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .left-menu, .right-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modes-panel, .time-panel {
            display: flex;
            background-color: var(--sub-color);
            border-radius: 8px;
            padding: 6px;
            gap: 5px;
        }

        .mode-btn, .time-btn, .nav-action-btn {
            background: none;
            border: none;
            color: var(--main-color);
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .mode-btn.active, .time-btn.active {
            background-color: var(--bg-color);
            color: var(--caret-color);
        }

        .nav-action-btn {
            background-color: var(--sub-color);
            color: var(--text-color);
        }
        .nav-action-btn:hover {
            color: var(--caret-color);
        }

        .user-badge {
            font-size: 0.9rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--sub-color);
            padding: 6px 14px;
            border-radius: 6px;
        }

        .user-badge img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--caret-color);
        }

        .btn-auth-trigger {
            background-color: var(--caret-color);
            color: var(--sub-color);
            border: none;
            padding: 8px 16px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .btn-auth-trigger:hover { opacity: 0.9; }

        .btn-logout {
            background: none;
            border: 1px solid var(--main-color);
            color: var(--main-color);
            padding: 2px 8px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .btn-logout:hover { color: var(--error-color); border-color: var(--error-color); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .timer-badge {
            color: var(--caret-color);
            font-weight: bold;
            font-size: 2rem;
        }

        .game-mode-indicator {
            font-size: 0.9rem;
            color: var(--main-color);
            background: var(--sub-color);
            padding: 4px 12px;
            border-radius: 4px;
        }

        .typing-wrapper {
            position: relative;
            height: 140px;
            overflow: hidden;
            width: 100%;
            cursor: text;
        }

        .words-container {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 0.6em;
            position: absolute;
            top: 0; left: 0; right: 0;
            transition: top 0.15s ease;
            font-size: 1.5rem;
            line-height: 2.2rem;
        }

        .word { position: relative; color: var(--main-color); white-space: nowrap; }
        .letter { position: relative; }
        .letter.correct { color: var(--text-color); }
        .letter.incorrect { color: var(--error-color); border-bottom: 2px dashed var(--error-color); }
        .letter.extra { color: var(--error-extra-color); }

        .caret {
    position: absolute;
    width: 4px; /* Thicker footprint for an organic liquid silhouette */
    height: 1.6rem;
    background-color: var(--caret-color);
    border-radius: 4px; /* Smooth rounded pill edges */
    left: 0; top: 0;
    pointer-events: none;
    z-index: 10;
    will-change: transform;
    
    /* Advanced organic physics curve: snakes out instantly, then slides smoothly into position */
    transition: transform 0.16s cubic-bezier(0.16, 1, 0.3, 1);
    
    /* Neon fluid bloom effect */
    box-shadow: 0 0 10px var(--caret-color), 
                0 0 4px var(--caret-color);
}
.caret.blink { 
    animation: caretBlink 1.2s ease-in-out infinite; 
}
        @keyframes caretBlink { 50% { opacity: 0; } }

        #hidden-input { position: absolute; opacity: 0; z-index: -100; left: -9999px; }

        .result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.4s ease forwards;
            width: 100%;
        }

        .stats-row { display: flex; gap: 50px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center;}
        .stat-box { display: flex; flex-direction: column; min-width: 120px;}
        .stat-label { font-size: 1.1rem; color: var(--main-color); margin-bottom: 5px; }
        .stat-value { font-size: 4.5rem; color: var(--caret-color); font-weight: bold; line-height: 1em;}
        
        .tier-badge-ui {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 20px;
            background: var(--sub-color);
            margin-bottom: 20px;
            display: inline-block;
        }

        .rank-status-notice { color: var(--success-color); font-size: 0.95rem; margin-bottom: 25px; min-height: 24px;}

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 21, 23, 0.85); display: none;
            justify-content: center; align-items: center; z-index: 100;
            padding: 15px;
        }

        .modal-card {
            background: var(--sub-color); padding: 35px; border-radius: 8px;
            width: 100%; max-width: 450px; color: var(--text-color);
            position: relative; animation: fadeIn 0.3s ease;
        }

        .modal-card.wide { max-width: 600px; }
        .modal-card h3 { margin-bottom: 20px; color: var(--caret-color); font-size: 1.4rem; display: flex; align-items: center; gap: 10px;}
        .modal-close { position: absolute; top: 15px; right: 20px; cursor: pointer; color: var(--main-color); background: none; border: none; font-size: 1.6rem;}
        .modal-close:hover { color: var(--error-color); }

        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: var(--main-color); }
        .form-group input {
            width: 100%; background: var(--bg-color); border: 2px solid transparent;
            padding: 12px; font-family: inherit; color: var(--text-color); border-radius: 5px; outline: none;
        }
        .form-group input:focus { border-color: var(--caret-color); }
        .modal-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

        .leaderboard-table {
            width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left;
        }
        .leaderboard-table th {
            color: var(--main-color); font-size: 0.85rem; text-transform: uppercase; padding-bottom: 10px; border-bottom: 1px solid var(--bg-color);
        }
        .leaderboard-table td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; vertical-align: middle;}
        
        .leaderboard-pfp {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            border: 1px solid var(--main-color);
        }

        .rank-slot { font-weight: bold; width: 50px; }
        .rank-1 { color: var(--gold-color); }
        .rank-2 { color: var(--silver-color); }
        .rank-3 { color: var(--bronze-color); }
        
        .leaderboard-loading { text-align: center; color: var(--main-color); padding: 30px 0; }

        .btn-primary { background: var(--caret-color); color: var(--sub-color); border: none; padding: 12px; font-family: inherit; font-weight: bold; border-radius: 5px; cursor: pointer; transition: opacity 0.2s;}
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: none; border: none; color: var(--main-color); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn-secondary:hover { color: var(--text-color); }
        
        .btn-restart {
            background: none; border: none; color: var(--main-color); font-family: inherit;
            font-size: 1.2rem; cursor: pointer; padding: 10px 20px; border-radius: 5px;
            transition: all 0.2s; display: flex; align-items: center; gap: 10px; margin-top: 15px;
        }
        .btn-restart:hover { color: var(--text-color); background-color: var(--sub-color); }
        .btn-restart svg { fill: currentColor; width: 20px; height: 20px; }

        .blur-notice {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(50, 52, 55, 0.9); display: flex;
            justify-content: center; align-items: center; color: var(--text-color);
            z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s;
            text-align: center;
            padding: 10px;
        }
        .typing-wrapper.blurred .blur-notice { opacity: 1; pointer-events: auto; }
        .server-status { font-size: 0.85rem; color: var(--error-color); margin-top: 5px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            body {
                padding: 0;
                justify-content: flex-start;
                height: 100vh;
                height: -webkit-fill-available;
            }
            .container {
                display: flex;
                flex-direction: column;
                height: 100vh;
                height: -webkit-fill-available;
                padding: 15px;
                justify-content: space-between;
            }
            .top-navbar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                margin-bottom: 15px;
            }
            .left-menu, .right-menu {
                flex-direction: row;
                justify-content: space-between;
                width: 100%;
            }
            .modes-panel, .time-panel {
                flex: 1;
                justify-content: center;
            }
            .mode-btn, .time-btn, .nav-action-btn, .btn-auth-trigger {
                padding: 10px 12px;
                font-size: 0.85rem;
                flex: 1;
                justify-content: center;
            }
            .user-badge {
                flex: 1;
                justify-content: center;
                padding: 8px;
            }
            .typing-wrapper {
                flex: 1;
                height: auto;
                min-height: 180px;
                display: flex;
                align-items: center;
            }
            .words-container {
                font-size: 1.3rem;
                line-height: 2rem;
            }
            .caret {
                height: 1.4rem;
                top: 5px;
            }
            .btn-restart {
                width: 100%;
                justify-content: center;
                padding: 14px;
                background-color: var(--sub-color);
                margin-bottom: 10px;
            }
            .modal-overlay {
                padding: 0;
            }
            .modal-card, .modal-card.wide {
                width: 100%;
                height: 100vh;
                height: -webkit-fill-available;
                max-width: 100%;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                overflow-y: auto;
                padding: 25px;
            }
            .modal-close {
                top: 20px;
                right: 20px;
                font-size: 2rem;
            }
            .stats-row {
                gap: 20px;
            }
            .stat-value {
                font-size: 3rem;
            }
            .result-screen {
                padding: 20px 0;
                height: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="left-menu">
            <div class="modes-panel">
                <button class="mode-btn active" id="mode-normal-btn">Normal</button>
                <button class="mode-btn" id="mode-ranked-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    Ranked Mode
                </button>
            </div>
            <div class="time-panel" id="time-selector-panel">
                <button class="time-btn" data-time="15">15s</button>
                <button class="time-btn active" data-time="30">30s</button>
                <button class="time-btn" data-time="60">60s</button>
            </div>
        </div>
        
        <div class="right-menu">
            <button class="nav-action-btn" id="view-leaderboard-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Leaderboard
            </button>
            <div id="auth-zone">
                <button class="btn-auth-trigger" id="open-auth-btn">Sign In / Register</button>
            </div>
        </div>
    </div>

    <div class="container" id="game-screen">
        <div class="header">
            <div class="timer-badge" id="timer">30</div>
            <div class="game-mode-indicator" id="mode-indicator">Normal Practice</div>
        </div>

        <div class="typing-wrapper" id="typing-wrapper">
            <div class="blur-notice" id="focus-notice">Tap/Click inside this panel to start typing</div>
            <div class="caret blink" id="caret"></div>
            <div class="words-container" id="words-container"></div>
        </div>

        <button class="btn-restart" id="inline-restart-btn">
            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            Restart
        </button>
    </div>

    <div class="result-screen" id="result-screen">
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-label">wpm</span>
                <span class="stat-value" id="res-wpm">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">accuracy</span>
                <span class="stat-value" id="res-acc">0%</span>
            </div>
        </div>
        
        <div>
            <span class="tier-badge-ui" id="tier-badge">Calculating Tier...</span>
        </div>
        
        <div class="rank-status-notice" id="rank-status-notice"></div>
        
        <button class="btn-restart" id="play-again-btn">
            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            Play Again
        </button>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-card">
            <button class="modal-close" id="close-auth-modal-btn">&times;</button>
            <h3 id="modal-title">Sign In to Account</h3>
            <form id="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="auth-user">Username</label>
                    <input type="text" id="auth-user" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="auth-pass">Password</label>
                    <input type="password" id="auth-pass" required autocomplete="current-password">
                </div>
                <div class="form-group" id="pfp-group" style="display: none;">
                    <label for="auth-file">Profile Photo (Optional)</label>
                    <input type="file" id="auth-file" accept="image/*">
                </div>
                <div class="server-status" id="server-msg"></div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary" id="btn-submit-auth">Sign In</button>
                    <button type="button" class="btn-secondary" id="toggle-auth-mode">Need an account? Register</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="leaderboard-modal">
        <div class="modal-card wide">
            <button class="modal-close" id="close-leaderboard-modal-btn">&times;</button>
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Global Top 10 Standing Arena
            </h3>
            
            <div id="leaderboard-content">
                <div class="leaderboard-loading">Retrieving verified ledger rankings...</div>
            </div>
        </div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autocapitalize="off" autofocus>

    <script>
        (function() {
            const _cx01 = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3V3BnM0U0d1hZWEJMX1N0a204R3VsbTZGLXFHSlFYRWRLZnBjM1BXVXZ3QzFaaU9wMHd6MjZzR3NPaFFweTNQdFYvZXhlYw==";
            const _cx02 = "MzhkYzVjOWY3NGY1Y2IyOWVmZmZlYjM2MWY0YjgxOTc=";
            
            function _dx01(s) {
                try { return atob(s).trim(); } catch(e) { return ""; }
            }
            
            const SCRIPT_URL = _dx01(_cx01);

            const WORD_LIST = ["the", "be", "to", "of", "and", "a", "in", "that", "have", "i", "it", "for", "not", "on", "with", "he", "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", "she", "or", "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", "out", "if", "about", "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", "no", "just", "him", "know", "take", "people", "into", "year", "your", "good", "some", "could", "them", "see", "other", "than", "then", "now", "look", "only", "come", "its", "over", "think", "also", "back", "after", "use", "two", "how", "our", "work", "first", "well", "way", "even", "new", "want", "because", "any", "these", "give", "day", "most", "us"];
            
            let timeLimit = 30;
            let wordsArray = [], typedWords = [], currentWordIndex = 0;
            let timeLeft = timeLimit, timerInterval = null, isGameActive = false, gameEnded = false;
            let totalKeysPressed = 0, totalCorrectChars = 0;
            
            let currentMode = "normal"; 
            let userSession = null;    
            let isAuthRegisterMode = false;

            const wordsContainer = document.getElementById('words-container');
            const typingWrapper = document.getElementById('typing-wrapper');
            const hiddenInput = document.getElementById('hidden-input');
            const caret = document.getElementById('caret');
            const timerDisplay = document.getElementById('timer');
            const gameScreen = document.getElementById('game-screen');
            const resultScreen = document.getElementById('result-screen');
            const resWpm = document.getElementById('res-wpm');
            const resAcc = document.getElementById('res-acc');
            const modeIndicator = document.getElementById('mode-indicator');
            const rankStatusNotice = document.getElementById('rank-status-notice');
            const tierBadge = document.getElementById('tier-badge');
            
            const modeNormalBtn = document.getElementById('mode-normal-btn');
            const modeRankedBtn = document.getElementById('mode-ranked-btn');
            const timeSelectorPanel = document.getElementById('time-selector-panel');
            const authZone = document.getElementById('auth-zone');
            const openAuthBtn = document.getElementById('open-auth-btn');
            const authModal = document.getElementById('auth-modal');
            const closeAuthModalBtn = document.getElementById('close-auth-modal-btn');
            const modalTitle = document.getElementById('modal-title');
            const btnSubmitAuth = document.getElementById('btn-submit-auth');
            const toggleAuthModeBtn = document.getElementById('toggle-auth-mode');
            const serverMsg = document.getElementById('server-msg');
            const pfpGroup = document.getElementById('pfp-group');

            const viewLeaderboardBtn = document.getElementById('view-leaderboard-btn');
            const leaderboardModal = document.getElementById('leaderboard-modal');
            const closeLeaderboardModalBtn = document.getElementById('close-leaderboard-modal-btn');
            const leaderboardContent = document.getElementById('leaderboard-content');

            window.addEventListener('load', loadSessionFromStorage);
            window.addEventListener('resize', () => { requestAnimationFrame(updateCaretPosition); });
            typingWrapper.addEventListener('click', () => { if(!gameEnded) hiddenInput.focus(); });
            document.getElementById('inline-restart-btn').addEventListener('click', initGame);
            document.getElementById('play-again-btn').addEventListener('click', initGame);
            
            hiddenInput.addEventListener('focus', () => typingWrapper.classList.remove('blurred'));
            hiddenInput.addEventListener('blur', () => { if(!gameEnded) typingWrapper.classList.add('blurred'); });
            hiddenInput.addEventListener('input', handleInput);
            hiddenInput.addEventListener('keydown', handleKeyDown);

            modeNormalBtn.addEventListener('click', () => switchMode('normal'));
            modeRankedBtn.addEventListener('click', () => {
                if (!userSession) {
                    isAuthRegisterMode = false;
                    updateAuthModalUI();
                    authModal.style.display = 'flex';
                    serverMsg.textContent = "Sign in to unlock Ranked Mode!";
                } else {
                    switchMode('ranked');
                }
            });

            timeSelectorPanel.addEventListener('click', (e) => {
                if (isGameActive) return;
                const target = e.target.closest('.time-btn');
                if (!target) return;
                
                timeSelectorPanel.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                target.classList.add('active');
                timeLimit = parseInt(target.dataset.time, 10);
                initGame();
            });

            if(openAuthBtn) openAuthBtn.addEventListener('click', () => { isAuthRegisterMode = false; updateAuthModalUI(); authModal.style.display = 'flex'; });
            closeAuthModalBtn.addEventListener('click', () => { authModal.style.display = 'none'; });
            toggleAuthModeBtn.addEventListener('click', () => { isAuthRegisterMode = !isAuthRegisterMode; updateAuthModalUI(); });
            btnSubmitAuth.addEventListener('click', handleAuthSubmit);
            
            viewLeaderboardBtn.addEventListener('click', openLeaderboardModal);
            closeLeaderboardModalBtn.addEventListener('click', () => { leaderboardModal.style.display = 'none'; });

            function switchMode(mode) {
                if (isGameActive) return; 
                currentMode = mode;
                if (mode === 'normal') {
                    modeNormalBtn.classList.add('active');
                    modeRankedBtn.classList.remove('active');
                    modeIndicator.textContent = "Normal Practice";
                    timeSelectorPanel.style.pointerEvents = "auto";
                    timeSelectorPanel.style.opacity = "1";
                } else {
                    modeRankedBtn.classList.add('active');
                    modeNormalBtn.classList.remove('active');
                    modeIndicator.textContent = "🏆 Ranked Match (30s Lock)";
                    timeSelectorPanel.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    timeSelectorPanel.querySelector('[data-time="30"]').classList.add('active');
                    timeLimit = 30;
                    timeSelectorPanel.style.pointerEvents = "none";
                    timeSelectorPanel.style.opacity = "0.5";
                }
                initGame();
            }

            function updateAuthModalUI() {
                serverMsg.textContent = "";
                document.getElementById('auth-user').value = "";
                document.getElementById('auth-pass').value = "";
                document.getElementById('auth-file').value = "";
                if (!isAuthRegisterMode) {
                    modalTitle.textContent = "Sign In to Account";
                    btnSubmitAuth.textContent = "Sign In";
                    toggleAuthModeBtn.textContent = "Need an account? Register";
                    pfpGroup.style.display = "none";
                } else {
                    modalTitle.textContent = "Create New Account";
                    btnSubmitAuth.textContent = "Register Player";
                    toggleAuthModeBtn.textContent = "Already have an account? Sign In";
                    pfpGroup.style.display = "block";
                }
            }

            function getSkillTier(wpm, acc) {
                if (acc < 75 && wpm > 0) return { name: "Brute Typist", color: "#7e2a33" };
                if (wpm < 30) return { name: "Bronze Novice", color: "#cd7f32" };
                if (wpm < 55) return { name: "Silver Adept", color: "#c0c0c0" };
                if (wpm < 80) return { name: "Gold Specialist", color: "#ffd700" };
                if (wpm < 105) return { name: "Platinum Master", color: "#4ae2e2" };
                return { name: "Apex Godspeed", color: "#a04ae2" };
            }

            async function handleAuthSubmit() {
                const userVal = document.getElementById('auth-user').value.trim();
                const passVal = document.getElementById('auth-pass').value.trim();
                if(!userVal || !passVal) return;

                btnSubmitAuth.disabled = true;
                serverMsg.style.color = "var(--main-color)";
                serverMsg.textContent = "Processing...";

                let uploadedPfpUrl = "";
                const fileInput = document.getElementById('auth-file');

                if (isAuthRegisterMode && fileInput && fileInput.files.length > 0) {
                    const imgbbKey = _dx01(_cx02);
                    if (imgbbKey && imgbbKey.length > 5) {
                        serverMsg.textContent = "Uploading profile photo...";
                        const imgFormData = new FormData();
                        imgFormData.append("image", fileInput.files[0]);
                        try {
                            const imgbbRes = await fetch("https://api.imgbb.com/1/upload?key=" + imgbbKey, {
                                method: "POST",
                                body: imgFormData
                            });
                            const imgbbData = await imgbbRes.json();
                            if (imgbbData && imgbbData.data && imgbbData.data.url) {
                                uploadedPfpUrl = imgbbData.data.url;
                            }
                        } catch (e) {
                            serverMsg.style.color = "var(--error-color)";
                            serverMsg.textContent = "Image hosting failed.";
                            btnSubmitAuth.disabled = false;
                            return;
                        }
                    }
                }

                try {
                    const payload = {
                        action: isAuthRegisterMode ? "register" : "login",
                        username: userVal,
                        password: passVal,
                        pfp: uploadedPfpUrl
                    };

                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const data = await response.json();
                    
                    if(data.success) {
                        userSession = data.user;
                        userSession.password = passVal; 
                        localStorage.setItem('typing_user_session', JSON.stringify(userSession));
                        renderUserBar();
                        authModal.style.display = 'none';
                        switchMode('ranked');
                    } else {
                        serverMsg.style.color = "var(--error-color)";
                        serverMsg.textContent = data.message || "Execution blocked.";
                    }
                } catch (err) {
                    serverMsg.style.color = "var(--error-color)";
                    serverMsg.textContent = "Network linkage rejected.";
                } finally {
                    btnSubmitAuth.disabled = false;
                }
            }

            async function openLeaderboardModal() {
                leaderboardModal.style.display = 'flex';
                leaderboardContent.innerHTML = `<div class="leaderboard-loading">Retrieving verified ledger rankings...</div>`;
                
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "getLeaderboard" })
                    });
                    const data = await response.json();
                    
                    if (data.success && data.leaderboard.length > 0) {
                        let html = `
                            <table class="leaderboard-table">
                                <thead>
                                    <tr>
                                        <th>Rank</th>
                                        <th>Player Name</th>
                                        <th>High Score</th>
                                        <th>Accuracy</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        
                        data.leaderboard.forEach(player => {
                            let safePfp = player.pfp.replace(/"/g, '&quot;');
                            html += `
                                <tr>
                                    <td class="rank-slot rank-${player.rank}">${player.rank}</td>
                                    <td style="color: var(--text-color); font-weight: bold;">
                                        <img class="leaderboard-pfp" src="${safePfp}" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop'">
                                        ${player.username}
                                    </td>
                                    <td style="color: var(--caret-color); font-weight: bold;">${player.wpm} <span style="font-size:0.75rem; font-weight:normal; color:var(--main-color)">WPM</span></td>
                                    <td style="color: var(--main-color)">${player.acc}%</td>
                                </tr>
                            `;
                        });
                        
                        html += `</tbody></table>`;
                        leaderboardContent.innerHTML = html;
                    } else {
                        leaderboardContent.innerHTML = `<div class="leaderboard-loading" style="color: var(--error-color)">No ledger records active.</div>`;
                    }
                } catch (err) {
                    leaderboardContent.innerHTML = `<div class="leaderboard-loading" style="color: var(--error-color)">Network call structural blocking.</div>`;
                }
            }

            function loadSessionFromStorage() {
                const saved = localStorage.getItem('typing_user_session');
                if (saved) {
                    try {
                        userSession = JSON.parse(saved);
                        renderUserBar();
                    } catch(e) { userSession = null; }
                }
                initGame();
            }

            function renderUserBar() {
                if(userSession) {
                    let safeUrl = userSession.pfp.replace(/"/g, '&quot;');
                    authZone.innerHTML = `
                        <div class="user-badge">
                            <img src="${safeUrl}" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop'">
                            <span>⚡ <b>${userSession.username}</b></span>
                            <span style="color:var(--caret-color); font-weight:bold">${userSession.highScoreWPM || 0} WPM</span>
                            <button class="btn-logout" id="logout-act-btn">Logout</button>
                        </div>
                    `;
                    document.getElementById('logout-act-btn').addEventListener('click', logout);
                } else {
                    authZone.innerHTML = `<button class="btn-auth-trigger" id="open-auth-btn-direct">Sign In / Register</button>`;
                    document.getElementById('open-auth-btn-direct').addEventListener('click', () => {
                        isAuthRegisterMode = false;
                        updateAuthModalUI();
                        authModal.style.display = 'flex';
                    });
                }
            }

            function logout() {
                localStorage.removeItem('typing_user_session');
                userSession = null;
                renderUserBar();
                switchMode('normal');
            }

            function initGame() {
                wordsArray = []; typedWords = []; currentWordIndex = 0;
                timeLeft = timeLimit; isGameActive = false; gameEnded = false;
                totalKeysPressed = 0; totalCorrectChars = 0;
                
                clearInterval(timerInterval);
                timerDisplay.textContent = timeLeft;
                hiddenInput.value = '';
                
                gameScreen.style.display = 'block';
                resultScreen.style.display = 'none';
                typingWrapper.classList.remove('blurred');
                wordsContainer.style.top = '0px';
                rankStatusNotice.textContent = "";

                for (let i = 0; i < 120; i++) {
                    wordsArray.push(WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)]);
                    typedWords.push('');
                }

                wordsContainer.innerHTML = wordsArray.map(word => {
                    return `<div class="word">${word.split('').map(char => `<span class="letter">${char}</span>`).join('')}</div>`;
                }).join('');

                wordsContainer.children[0].classList.add('active');
                caret.classList.add('blink');
                
                setTimeout(() => {
                    hiddenInput.focus();
                    updateCaretPosition();
                }, 50);
            }

            function handleInput(e) {
                if (gameEnded) return;
                if (!isGameActive) {
                    startTimer();
                    isGameActive = true;
                    caret.classList.remove('blink');
                }

                let value = hiddenInput.value;
                
                if (value === ' ') {
                    hiddenInput.value = '';
                    return;
                }

                if (value.endsWith(' ')) {
                    const cleanedValue = value.trim();
                    if (cleanedValue.length > 0) {
                        typedWords[currentWordIndex] = cleanedValue;
                        tallyWordCharacters(currentWordIndex);

                        if (currentWordIndex < wordsArray.length - 1) {
                            wordsContainer.children[currentWordIndex].classList.remove('active');
                            currentWordIndex++;
                            wordsContainer.children[currentWordIndex].classList.add('active');
                            hiddenInput.value = '';
                        } else {
                            endGame();
                            return;
                        }
                    } else { hiddenInput.value = ''; }
                } else { typedWords[currentWordIndex] = value; }

                updateWordDOM(currentWordIndex);
                autoScrollLines();
                updateCaretPosition();
            }

            function handleKeyDown(e) {
                if (gameEnded) return;
                if(e.key !== 'Backspace' && e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt') {
                    totalKeysPressed++;
                }
                
                if (e.key === 'Backspace' && hiddenInput.value === '' && currentWordIndex > 0) {
                    e.preventDefault();
                    wordsContainer.children[currentWordIndex].classList.remove('active');
                    resetWordDOM(currentWordIndex);
                    currentWordIndex--;
                    wordsContainer.children[currentWordIndex].classList.add('active');
                    hiddenInput.value = typedWords[currentWordIndex];
                    updateWordDOM(currentWordIndex);
                    autoScrollLines();
                    updateCaretPosition();
                }
            }

            function updateWordDOM(index) {
                const wordEl = wordsContainer.children[index];
                if(!wordEl) return;
                const targetWord = wordsArray[index];
                const typedWord = typedWords[index] || '';
                wordEl.querySelectorAll('.letter.extra').forEach(el => el.remove());

                const letterSpans = wordEl.querySelectorAll('.letter');
                for (let i = 0; i < targetWord.length; i++) {
                    const span = letterSpans[i];
                    if(!span) continue;
                    span.className = 'letter';
                    if (i < typedWord.length) {
                        span.classList.add(typedWord[i] === targetWord[i] ? 'correct' : 'incorrect');
                    }
                }
                if (typedWord.length > targetWord.length) {
                    for (let i = targetWord.length; i < typedWord.length; i++) {
                        const extraSpan = document.createElement('span');
                        extraSpan.className = 'letter incorrect extra';
                        extraSpan.textContent = typedWord[i];
                        wordEl.appendChild(extraSpan);
                    }
                }
            }

            function resetWordDOM(index) {
                const wordEl = wordsContainer.children[index];
                if(!wordEl) return;
                wordEl.querySelectorAll('.letter.extra').forEach(el => el.remove());
                wordEl.querySelectorAll('.letter').forEach(span => span.className = 'letter');
            }

            function updateCaretPosition() {
    const activeWordEl = wordsContainer.children[currentWordIndex];
    if (!activeWordEl) return;
    
    const letterSpans = activeWordEl.querySelectorAll('.letter');
    const typedWord = typedWords[currentWordIndex] || '';
    
    const wrapperRect = typingWrapper.getBoundingClientRect();
    let targetLeft = 0;
    let targetTop = 0;
    
    if (typedWord.length === 0) {
        if (letterSpans.length > 0) {
            const rect = letterSpans[0].getBoundingClientRect();
            targetLeft = rect.left - wrapperRect.left;
            targetTop = rect.top - wrapperRect.top;
        } else {
            const rect = activeWordEl.getBoundingClientRect();
            targetLeft = rect.left - wrapperRect.left;
            targetTop = rect.top - wrapperRect.top;
        }
    } else {
        const targetIndex = Math.min(typedWord.length - 1, letterSpans.length - 1);
        const currentSpan = letterSpans[targetIndex];
        if (currentSpan) {
            const rect = currentSpan.getBoundingClientRect();
            targetLeft = rect.right - wrapperRect.left;
            targetTop = rect.top - wrapperRect.top;
        }
    }
    
    /* Tuned vertical alignment matching the 4px rounded pill boundary */
    caret.style.transform = `translate3d(${targetLeft}px, ${targetTop + 5}px, 0)`;
}

            function autoScrollLines() {
                const activeWordEl = wordsContainer.children[currentWordIndex];
                if (!activeWordEl) return;
                wordsContainer.style.top = activeWordEl.offsetTop > 40 ? `-${activeWordEl.offsetTop - 35}px` : '0px';
            }

            function startTimer() {
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.textContent = timeLeft;
                    if (timeLeft <= 0) endGame();
                }, 1000);
            }

            function sampleTallyCurrentWord() {
                tallyWordCharacters(currentWordIndex);
            }

            function tallyWordCharacters(index) {
                const target = wordsArray[index];
                const typed = typedWords[index] || '';
                for(let i = 0; i < typed.length; i++) {
                    if(target[i] && typed[i] === target[i]) totalCorrectChars++;
                }
            }

            function endGame() {
                gameEnded = true;
                clearInterval(timerInterval);
                hiddenInput.blur();
                sampleTallyCurrentWord();

                const minutes = (timeLimit - timeLeft > 0 ? timeLimit - timeLeft : timeLimit) / 60;
                let wpm = Math.round((totalCorrectChars / 5) / minutes);
                if (wpm < 0 || isNaN(wpm) || !isFinite(wpm)) wpm = 0;
                let accuracy = totalKeysPressed > 0 ? Math.round((totalCorrectChars / totalKeysPressed) * 100) : 0;
                if (accuracy > 100) accuracy = 100;

                resWpm.textContent = wpm;
                resAcc.textContent = `${accuracy}%`;

                const tier = getSkillTier(wpm, accuracy);
                tierBadge.textContent = tier.name;
                tierBadge.style.color = tier.color;

                gameScreen.style.display = 'none';
                resultScreen.style.display = 'flex';

                if (currentMode === 'ranked' && userSession) {
                    syncRankedScoreToServer(wpm, accuracy);
                } else if (currentMode === 'ranked') {
                    rankStatusNotice.style.color = "var(--error-color)";
                    rankStatusNotice.textContent = "Session invalid.";
                }
            }

            async function syncRankedScoreToServer(wpm, accuracy) {
                rankStatusNotice.style.color = "var(--main-color)";
                rankStatusNotice.textContent = "Syncing performance metrics to ledger...";

                try {
                    const syncPayload = {
                        action: "submitScore",
                        username: userSession.username,
                        password: userSession.password, 
                        wpm: wpm,
                        acc: accuracy
                    };

                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(syncPayload) });
                    const data = await response.json();
                    
                    if (data.success) {
                        userSession.highScoreWPM = data.highScoreWPM;
                        userSession.highScoreAcc = data.highScoreAcc;
                        localStorage.setItem('typing_user_session', JSON.stringify(userSession));
                        renderUserBar();

                        rankStatusNotice.style.color = "var(--success-color)";
                        rankStatusNotice.textContent = data.isNewHigh 
                            ? `🎉 New Personal Best: ${wpm} WPM!` 
                            : "Match performance logged successfully.";
                    } else {
                        throw new Error(data.message || "Rejected.");
                    }
                } catch (err) {
                    rankStatusNotice.style.color = "var(--error-color)";
                    rankStatusNotice.textContent = "Sync Failure.";
                }
            }
        })();
    </script>
</body>
</html>
